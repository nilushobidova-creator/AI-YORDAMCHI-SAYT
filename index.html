<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIVIDA AI | Pro Manager</title>
    <style>
        /* PRO DESIGN SYSTEM */
        :root {
            --bg-dark: #0f172a;
            --panel: #1e293b;
            --gold: #eab308;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); }
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar Navigation */
        .sidebar { width: 250px; background: #020617; border-right: 1px solid #334155; padding: 20px; }
        .menu-item { padding: 15px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: var(--text-dim); }
        .menu-item.active { background: var(--panel); color: var(--gold); border: 1px solid var(--gold); }
        
        /* Main Content */
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .chat-area { max-width: 800px; margin: auto; }
        
        /* Chat Design */
        .message { padding: 15px; border-radius: 10px; margin-bottom: 15px; max-width: 80%; }
        .message.ai { background: var(--panel); border-left: 4px solid var(--gold); align-self: flex-start; }
        .message.user { background: var(--gold); color: #000; align-self: flex-end; margin-left: auto; }
        
        /* Audio Section */
        .upload-section { border: 2px dashed #475569; padding: 40px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { border-color: var(--gold); background: #1e293b; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2 style="color:var(--gold)">ALIVIDA AI</h2>
        <div class="menu-item active" onclick="switchView('chat')">💬 AI Coach</div>
        <div class="menu-item" onclick="switchView('audio')">🎙️ Audio Tahlil</div>
    </div>
    
    <div class="content" id="mainView">
        <!-- Dynamic content goes here -->
    </div>
</div>

<script>
    // GLOBAL STATE MANAGEMENT
    const state = {
        messages: [],
        currentView: 'chat'
    };

    // AI LOGIC (STRICT)
    function getAIResponse(input) {
        const msg = input.toLowerCase();
        
        // 1. STRICT SALOM CHECK
        if (msg === "salom" || msg === "assalomu alaykum" || msg.includes("salom")) {
            return "Salom, bugungi kunlik rejangiz qancha, nima muammolar bo'lsa so'rang yordam beraman.";
        }
        
        // 2. PRODUCT INFO LOGIC
        if (msg.includes("narx") || msg.includes("qancha")) {
            return "1 quti Abihayat — 600,000 so'm. 4 quti (kurs) — 2,400,000 so'm. Aksiya: 2 ta olsangiz, yana 2 ta bonus qo'shib beramiz. To'lov oldindan emas, mahsulot borganda.";
        }

        // 3. FALLBACK
        return "Tushunarli. Abihayat tarkibi: asal, jenshen, ashvaganda, baxmal. 1 quti 22,5 kunga yetadi. Mijozning aynan qaysi shikoyati bo'yicha ko'rsatma kerak?";
    }

    function switchView(view) {
        state.currentView = view;
        const main = document.getElementById('mainView');
        
        if (view === 'chat') {
            main.innerHTML = `
                <div class="chat-area">
                    <div id="msgBox" style="display:flex; flex-direction:column;"></div>
                    <div style="margin-top:20px; display:flex;">
                        <input type="text" id="userInput" style="flex:1; padding:15px; background:#1e293b; border:none; color:white; border-radius:8px;">
                        <button onclick="handleSend()" style="padding:15px; background:var(--gold); border:none; border-radius:8px; margin-left:10px;">Yuborish</button>
                    </div>
                </div>
            `;
        } else {
            main.innerHTML = `
                <div class="chat-area">
                    <h2>Audio fayl yuklash</h2>
                    <div class="upload-section" onclick="document.getElementById('audioFile').click()">
                        <p>Audio faylni tanlang (MP3/WAV)</p>
                        <input type="file" id="audioFile" accept="audio/*" style="display:none">
                    </div>
                    <div id="fileStatus" style="margin-top:20px; color:var(--gold)"></div>
                </div>
            `;
            // File listener
            document.getElementById('audioFile').onchange = (e) => {
                document.getElementById('fileStatus').innerText = "Tanlandi: " + e.target.files[0].name;
            };
        }
    }

    function handleSend() {
        const input = document.getElementById('userInput');
        const msg = input.value;
        if (!msg) return;
        
        state.messages.push({role: 'user', text: msg});
        state.messages.push({role: 'ai', text: getAIResponse(msg)});
        
        input.value = '';
        renderMessages();
    }

    function renderMessages() {
        const box = document.getElementById('msgBox');
        box.innerHTML = state.messages.map(m => `
            <div class="message ${m.role}">${m.text}</div>
        `).join('');
    }

    // Initialize
    switchView('chat');
</script>
</body>
</html>
