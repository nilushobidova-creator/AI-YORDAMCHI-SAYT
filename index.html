<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SotuvAI — Coach va Tahlil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14213D; --ink-light:#1F2E52; --paper:#F6F3EC;
    --gold:#C08A28; --gold-light:#E8C97A;
    --success:#4C7A5E; --danger:#B5483F; --muted:#6B6558; --line:#EAE4D3;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Manrope',sans-serif;background:var(--paper);color:#242017;}
  h1,h2,.serif{font-family:'Fraunces',serif;}
  .app{display:flex;height:100vh;}
  .sidebar{width:260px;flex-shrink:0;background:var(--ink);color:var(--paper);display:flex;flex-direction:column;}
  .sidebar .brand{padding:30px 24px 20px;}
  .sidebar .brand .name{font-size:22px;font-weight:600;color:var(--paper);}
  .sidebar .brand .sub{font-size:13px;color:#9AA3BD;margin-top:4px;}
  .ikat{width:100%;height:8px;}
  .nav{flex:1;padding:20px 16px;display:flex;flex-direction:column;gap:6px;}
  .nav button{display:flex;align-items:center;gap:12px;padding:12px 16px;border:none;background:none;color:#C7CCDB;font-size:15px;border-radius:8px;cursor:pointer;text-align:left;font-family:inherit; transition: background 0.2s;}
  .nav button:hover{background:#1B2A4A;color:var(--paper);}
  .nav button.active{background:var(--ink-light);color:var(--gold-light);font-weight:600;}
  .sidebar .foot{padding:20px 24px;font-size:12px;color:#7C86A3;border-top:1px solid #25335A;}
  .main{flex:1;overflow-y:auto;}
  
  .page{padding:50px;max-width:1200px;margin: 0 auto; width: 100%;}
  .page h1{font-size:34px;color:var(--ink);margin:0;}
  .page .desc{color:var(--muted);margin-top:8px; font-size:16px;}
  .divider{width:180px;margin-top:16px;}
  
  /* Chat styles */
  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 100px);}
  .chat-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .btn-outline{font-size:14px;padding:10px 18px;border:1px solid #D8D1BE;border-radius:8px;background:#fff;cursor:pointer;color:var(--ink);font-weight:500;transition: all 0.2s;}
  .btn-outline:hover{background:#F0EBDD;}
  .messages{flex:1;overflow-y:auto;margin-top:20px;display:flex;flex-direction:column;gap:14px;padding-right: 10px;}
  .msg{max-width:75%;padding:14px 18px;border-radius:12px;font-size:15px;white-space:pre-wrap;line-height:1.6;}
  .msg.user{align-self:flex-end;background:var(--ink);color:var(--paper);}
  .msg.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);box-shadow: 0 2px 6px rgba(0,0,0,0.02);}
  .chat-input{display:flex;gap:10px;margin-top:20px;}
  .chat-input input{flex:1;font-family:inherit;font-size:15px;border:1px solid #D8D1BE;border-radius:8px;background:#fff;padding:14px 16px;}
  .chat-input input:focus{outline:none;box-shadow:0 0 0 2px var(--gold);}
  .btn-send{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:0 24px;cursor:pointer;font-size:16px;}
  .btn-send:hover{background:var(--ink-light);}
  .typing{color:#8A8371;font-size:14px;font-style:italic;}
  
  /* Call Analysis Styles */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:30px;}
  .step-row{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:15px;margin-bottom:8px;}
  .step-row button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:18px;}
  .field-label{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:10px; margin-top:20px;}
  textarea.transcript{width:100%;font-family:inherit;font-size:14px;border:1px solid #D8D1BE;border-radius:8px;padding:14px;resize:vertical;}
  .btn-analyze{width:100%;margin-top:16px;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;}
  .btn-analyze:hover{background:var(--ink-light);}
  .btn-analyze:disabled{opacity:.7;cursor:default;}
  .result-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:20px;}
  .result-card .title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:12px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="name">✦ SotuvAI</div>
      <div class="sub">Murabbiy va Tahlilchi</div>
    </div>
    <svg class="ikat" viewBox="0 0 200 10" preserveAspectRatio="none"></svg>
    <div class="nav">
      <button data-tab="chat" class="active">💬 AI Murabbiy (Coach)</button>
      <button data-tab="call">📞 Qo'ng'iroq tahlili</button>
    </div>
    <div class="foot">Tizim oflayn mock rejimida ishlashga qodir.</div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
const defaultState = {
  tab: "chat",
  productInfo: `Sizning rolingiz: Call-markazning tajribali sotuv menejeri, sotuvchilar murabbiyi (coach) va sog'lom ovqatlanish bo'yicha mutaxassis.
Sizning vazifangiz: Sotuvchilarga mijozlar bilan qanday ishlashni, e'tirozlarni qanday yengishni o'rgatish va mahsulot haqida chuqurlashtirilgan ma'lumot berish.

QAT'IY QOIDALAR VA KUTILAYOTGAN JAVOBLAR:
1. Agar foydalanuvchi "Salom" yoki shunga o'xshash so'z yozsa, faqat quyidagi gapni yozing (boshqa gap qo'shmang): "Salom, bugungi kunlik rejangiz qancha, nima muammolar bo'lsa so'rang yordam beraman".
2. Agar foydalanuvchi e'tiroz yozsa (masalan: "mijoz o'ylab ko'raman dedi"), darhol sotuv psixologiyasini ishlatib, bu e'tirozni qanday yopish bo'yicha aniq skript bering va ochiq savollar so'rashni o'rgating.
3. Hech qanday holatda narxlar haqida ma'lumot bermang va "pul qaytarish kafolati" (money-back guarantee) iboralarini ishlatmang.

MAHSULOT (ABIHAYAT) MA'LUMOTI:
- 100% tabiiy mahsulot. Turkiyaning Bursa tog'laridan keltiriladi.
- Dori vositasi EMAS va biologik faol qo'shimcha (BAD) EMAS.
- Tarkibi: Zaytun, kekkik va dolchin.
- Ta'sir mexanizmi (Qandli diabet va kasalliklar uchun):
  * Dolchin: Qondagi qand miqdorini barqarorlashtirishga yordam beradi, hujayralarning insulinga sezgirligini oshiradi.
  * Kekkik (Timyan): Kuchli yallig'lanishga qarshi va antibakterial xususiyatga ega, immunitetni ko'taradi va nafas olish yo'llarini tozalaydi.
  * Zaytun: Tarkibidagi antioksidantlar va foydali yog'lar yurak-qon tomir tizimini himoya qiladi, organizmdan toksinlarni chiqaradi.`,
  scriptSteps: [
    "Salomlashish va mijozning ishonchiga kirish",
    "Ochiq savollar orqali ehtiyojni aniqlash",
    "Abihayatni yechim sifatida ko'rsatish (Tarkibi va ta'siri)",
    "Dori yoki BAD emasligini, Turkiyaning 100% tabiiy mahsuloti ekanini aytish",
    "E'tirozlarni yengish",
    "Sotuvni yopish (Narx va kafolatlar tilga olinmaydi)"
  ],
  messages: [],
  history: [],
  showEditor: false,
  loadingChat: false,
  loadingAnalyze: false,
  result: null
};

let state = JSON.parse(JSON.stringify(defaultState));

// Saqlangan ma'lumotlarni o'qish
try {
  const saved = localStorage.getItem("sotuvAI_coach_state");
  if(saved){
    const parsed = JSON.parse(saved);
    if(parsed.tab) state.tab = parsed.tab;
    if(parsed.messages) state.messages = parsed.messages;
    if(parsed.history) state.history = parsed.history;
  }
} catch(e){}

function saveState(){
  localStorage.setItem("sotuvAI_coach_state", JSON.stringify({
    tab: state.tab,
    messages: state.messages,
    history: state.history
  }));
}

function ikatSVG(){
  let s = "";
  for(let i=0;i<20;i++){ s += `<polyline points="${i*10},10 ${i*10+5},0 ${i*10+10},10" fill="none" stroke="#C08A28" stroke-width="1.4"/>`; }
  return s;
}

// --- MOCK API (PCda server yo'q bo'lsa ishlaydi) ---
async function mockChatResponse(msg) {
  await new Promise(r => setTimeout(r, 800));
  const lowerMsg = msg.toLowerCase();
  
  if (lowerMsg.includes("salom")) {
    return "Salom, bugungi kunlik rejangiz qancha, nima muammolar bo'lsa so'rang yordam beraman.";
  } 
  else if (lowerMsg.includes("o'ylab ko'raman") || lowerMsg.includes("o'ylab koraman")) {
    return `Mijoz "o'ylab ko'raman" desa, bu suhbatni tugatish degani emas! Bu ko'pincha muloyim rad etish yoki ikkilanish belgisidir. 

Bunday holatda shunday yo'l tuting:
"Tushunaman, sog'liq muhim masala, shoshilmasdan qaror qabul qilganingiz ma'qul. Sir bo'lmasa aytingchi, sizni asosan nima o'ylantiryapti? Natija bermasligimi yoki boshqa sabab bormi?"

Shu tariqa mijozni gapirtiring va asl e'tirozini bilib olib, unga yechim bering.`;
  }
  else if (lowerMsg.includes("qand") || lowerMsg.includes("diabet") || lowerMsg.includes("kasallik")) {
    return `Mijozga shunday tushuntiring: Abihayat qandli diabet va umumiy kasalliklarda yordam beradigan 100% tabiiy vosita. 

Tarkibidagi 3 ta asosiy ne'mat:
1. Dolchin: Qondagi qand miqdorini barqarorlashtiradi, hujayralarni insulinga sezgir qiladi.
2. Kekkik (Timyan): Organizmda yallig'lanishni oladi va immunitetni kuchaytiradi.
3. Zaytun: Antioksidantlarga boy, qon-tomirlarni tozalaydi va yurakka quvvat beradi.

Eng muhimi — bu dori emas, BAD emas, Turkiyaning Bursa tog'laridan olingan toza tabiat in'omi ekanligini alohida ta'kidlang.`;
  }
  
  return "Zo'r savol! Qoidamizni unutmang: biz pul qaytarish kafolati yoki narxlar haqida ma'lumot bermaymiz. Mijozga Abihayat 100% tabiiy ekanligini, zaytun, kekkik va dolchindan iboratligini uqtiring. Yana qanday holat bo'yicha yordam kerak?";
}

async function apiChat(message){
  try {
    const res = await fetch("/api/chat", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({productInfo: state.productInfo, message})
    });
    if(!res.ok) throw new Error("Server xatosi");
    const data = await res.json();
    return data.reply;
  } catch(e) {
    console.warn("Backend server topilmadi. Mock API simulyatsiyasi ishga tushdi...");
    return await mockChatResponse(message);
  }
}

async function apiAnalyze(transcript){
  try {
    const res = await fetch("/api/analyze", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({scriptSteps: state.scriptSteps, transcript})
    });
    if(!res.ok) throw new Error("Server xatosi");
    return await res.json();
  } catch(e) {
    console.warn("Backend server topilmadi. Mock tahlil simulyatsiyasi ishga tushdi...");
    await new Promise(r => setTimeout(r, 1500));
    return {
      honesty_score: 95, script_completion: 85,
      summary: "Suhbat yaxshi o'tgan. Mijoz bilan to'g'ri ishlangan, mahsulotning tabiiy ekanligi va tarkibi aytilgan. Dori emasligi ta'kidlangan.",
      steps: state.scriptSteps.map(s => ({step: s, completed: Math.random() > 0.2}))
    };
  }
}

// --- RENDER FUNKSIYALARI ---
function setTab(t){ state.tab = t; saveState(); render(); }

function render(){
  document.querySelectorAll(".nav button").forEach(b=>{
    b.classList.toggle("active", b.dataset.tab === state.tab);
    b.onclick = () => setTab(b.dataset.tab);
  });
  
  const main = document.getElementById("main");
  if(state.tab === "chat") main.innerHTML = renderChat();
  if(state.tab === "call") main.innerHTML = renderCall();
  attachHandlers();
}

function renderChat(){
  return `
  <div class="page chat-wrap">
    <div class="chat-top">
      <div>
        <h1>AI Sotuv Murabbiyi</h1>
        <p class="desc">Sotuvdagi muammolaringizni yozing yoki "Salom" deb suhbatni boshlang.</p>
      </div>
      <button class="btn-outline" id="toggleEditor">${state.showEditor ? "Tahrirni yopish" : "Yo'riqnomani ko'rish"}</button>
    </div>
    <svg class="ikat divider" viewBox="0 0 200 10" preserveAspectRatio="none">${ikatSVG()}</svg>
    
    ${state.showEditor ? `<textarea id="productInfo" rows="10" style="width:100%;margin-top:16px;line-height:1.5;padding:12px;border:1px solid var(--gold);border-radius:8px;">${state.productInfo}</textarea>` : ""}
    
    <div class="messages" id="messages">
      ${state.messages.length===0 ? `<div style="color:#8A8371;font-size:15px;text-align:center;margin-top:20px;">Masalan: "Salom" deb yozing yoki "Mijoz qimmat deyapti, nima qilay?" deb so'rang.</div>` : ""}
      ${state.messages.map(m=>`<div class="msg ${m.role==='user'?'user':'ai'}"><b>${m.role==='user'?'Siz':'AI Murabbiy'}:</b><br>${m.text}</div>`).join("")}
      ${state.loadingChat ? `<div class="typing">Murabbiy javob yozmoqda...</div>` : ""}
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Xabaringizni yozing..." />
      <button class="btn-send" id="sendChat">➤</button>
      <button class="btn-outline" id="clearChat" title="Chatni tozalash">🗑</button>
    </div>
  </div>`;
}

function renderCall(){
  return `
  <div class="page">
    <h1>Qo'ng'iroq tahlili</h1>
    <p class="desc">Mijoz bilan suhbat matnini kiriting. Tizim uni skript bo'yicha baholaydi.</p>
    <svg class="ikat divider" viewBox="0 0 200 10" preserveAspectRatio="none">${ikatSVG()}</svg>
    <div class="cols">
      <div>
        <div class="field-label">Suhbat matni</div>
        <textarea class="transcript" id="transcript" rows="12" placeholder="Sotuvchi: Assalomu alaykum...&#10;Mijoz: Vaalaykum assalom..."></textarea>
        
        <button class="btn-analyze" id="analyzeBtn" ${state.loadingAnalyze?"disabled":""}>
          ${state.loadingAnalyze?"Tahlil qilinmoqda...":"📞 Tahlil qilish"}
        </button>
      </div>
      <div id="resultCol">
        ${state.result ? renderResult(state.result) : `<div class="result-card" style="text-align:center;color:var(--muted);padding:40px;">Tahlil natijasi shu yerda ko'rinadi.</div>`}
      </div>
    </div>
  </div>`;
}

function renderResult(r){
  return `
    <div class="result-card">
      <div class="title">Xulosa</div>
      <p style="font-size:15px;color:#4B4536;margin:0;line-height:1.5;">${r.summary || ""}</p>
    </div>
    <div class="result-card">
      <div class="title">Skript tekshiruvi</div>
      ${(r.steps||[]).map(s=>`
        <div style="display:flex; gap:10px; margin-bottom:10px; font-size:15px;">
          <span style="color:${s.completed?'#4C7A5E':'#B5483F'};font-weight:bold;">${s.completed?"✔":"✕"}</span>
          <span>${s.step}</span>
        </div>`).join("")}
    </div>
  `;
}

function attachHandlers(){
  const toggleEditor = document.getElementById("toggleEditor");
  if(toggleEditor) toggleEditor.onclick = () => { state.showEditor = !state.showEditor; render(); };

  const productInfo = document.getElementById("productInfo");
  if(productInfo) productInfo.oninput = (e) => { state.productInfo = e.target.value; saveState(); };

  const sendChat = document.getElementById("sendChat");
  const chatInput = document.getElementById("chatInput");
  const clearChat = document.getElementById("clearChat");
  
  if(clearChat) clearChat.onclick = () => { state.messages = []; saveState(); render(); };

  if(sendChat){
    const send = async () => {
      const val = chatInput.value.trim();
      if(!val || state.loadingChat) return;
      
      state.messages.push({role:"user", text: val});
      saveState();
      state.loadingChat = true;
      render();
      
      try{
        const reply = await apiChat(val);
        state.messages.push({role:"ai", text: reply});
        saveState();
      }catch(e){
        state.messages.push({role:"ai", text: "Xatolik yuz berdi. Qayta urinib ko'ring."});
      }
      
      state.loadingChat = false;
      render();
      const box = document.getElementById("messages");
      if(box) box.scrollTop = box.scrollHeight;
      document.getElementById("chatInput").focus();
    };
    sendChat.onclick = send;
    chatInput.onkeydown = (e) => { if(e.key === "Enter") send(); };
    if(state.tab === "chat") chatInput.focus();
  }

  const analyzeBtn = document.getElementById("analyzeBtn");
  const transcriptEl = document.getElementById("transcript");
  if(analyzeBtn){
    analyzeBtn.onclick = async () => {
      const t = transcriptEl.value.trim();
      if(!t || analyzeBtn.disabled) return;
      
      state.loadingAnalyze = true;
      render();
      
      try{
        state.result = await apiAnalyze(t);
      }catch(e){
        alert("Xatolik yuz berdi: " + e.message);
      }
      
      state.loadingAnalyze = false;
      render();
    };
  }
}

// Dasturni ishga tushirish
document.querySelectorAll(".ikat").forEach(el => el.innerHTML = ikatSVG());
render();
</script>
</body>
</html>
