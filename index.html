<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SotuvAI — Sotuv menejeri yordamchisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@0.330.0/dist/umd/lucide.js"></script>
<style>
  :root{
    --ink:#0B1526; --ink-2:#132038; --ink-deep:#060A13;
    --paper:#FAF6EC; --surface:#FFFFFF;
    --gold:#C6992E; --gold-light:#E7C766; --gold-deep:#8F6B1E;
    --success:#2F6B4A; --danger:#8B2E2E; --muted:#6E6656;
    --line:#E9DFC2; --line-gold:rgba(198,153,46,.28);
    --shadow-sm:0 1px 2px rgba(11,21,38,.06), 0 3px 10px rgba(11,21,38,.05);
    --shadow-md:0 6px 20px rgba(11,21,38,.10), 0 16px 40px rgba(11,21,38,.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Manrope',sans-serif;background:var(--paper);color:#231F16;}
  h1,h2,.serif{font-family:'Fraunces',serif;}
  .app{display:flex;height:100vh;}
  .sidebar{width:236px;flex-shrink:0;background:linear-gradient(180deg,var(--ink) 0%,var(--ink-deep) 100%);color:var(--paper);display:flex;flex-direction:column;border-right:1px solid var(--line-gold);}
  .sidebar .brand{padding:28px 22px 16px;display:flex;align-items:center;gap:10px;}
  .logo-badge{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--gold-light),var(--gold-deep));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(198,153,46,.35);}
  .logo-badge svg{width:19px;height:19px;color:var(--ink);stroke-width:2.2;}
  .sidebar .brand .name{font-size:21px;font-weight:700;color:var(--paper);letter-spacing:.01em;}
  .sidebar .brand .sub{font-size:11.5px;color:#8B96B8;margin-top:3px;letter-spacing:.02em;}
  .ikat{width:100%;height:9px;}
  .nav{flex:1;padding:20px 12px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
  .nav .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6E78A0;padding:14px 12px 4px;}
  .nav button{display:flex;align-items:center;gap:11px;padding:9px 12px;border:none;border-left:3px solid transparent;background:none;color:#AEB6CC;font-size:14px;border-radius:0 7px 7px 0;cursor:pointer;text-align:left;font-family:inherit;width:100%;transition:background .15s, color .15s;}
  .nav button .nav-icon-badge{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);flex-shrink:0;transition:background .15s;}
  .nav button svg{width:16px;height:16px;stroke-width:1.9;}
  .nav button:hover{background:rgba(198,153,46,.08);color:var(--paper);}
  .nav button:hover .nav-icon-badge{background:rgba(198,153,46,.16);}
  .nav button.active{background:rgba(198,153,46,.14);border-left-color:var(--gold);color:var(--gold-light);font-weight:700;}
  .nav button.active .nav-icon-badge{background:rgba(198,153,46,.22);}
  .sidebar .foot{padding:15px 18px;font-size:12px;color:#C7CCDB;border-top:1px solid var(--line-gold);}
  .sidebar .foot .who{font-weight:700;color:var(--gold-light);}
  .sidebar .foot .role{font-size:11px;color:#8B96B8;}
  .sidebar .foot button{margin-top:8px;width:100%;background:rgba(255,255,255,.05);color:#F6F3EC;border:1px solid rgba(198,153,46,.25);border-radius:6px;padding:7px 10px;font-size:12px;cursor:pointer;transition:background .15s,border-color .15s;display:flex;align-items:center;gap:7px;}
  .sidebar .foot button svg{width:14px;height:14px;stroke-width:2;}
  .sidebar .foot button:hover{background:rgba(198,153,46,.14);border-color:var(--gold);}
  .main{flex:1;overflow-y:auto;}
  .page{padding:38px 40px;max-width:1150px;}
  .page h1{font-size:29px;color:var(--ink);margin:0;letter-spacing:-.01em;}
  .page .desc{color:var(--muted);margin-top:7px;font-size:14px;}
  .divider{width:150px;margin-top:16px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:30px;}
  .card{background:var(--surface);border:1px solid var(--line-gold);border-top:3px solid var(--gold);border-radius:12px;padding:17px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:14px;}
  .card .stat-icon{width:42px;height:42px;border-radius:10px;background:rgba(198,153,46,.10);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card .stat-icon svg{width:20px;height:20px;stroke-width:1.8;color:var(--gold-deep);}
  .card .label{font-size:11px;color:#8A8371;text-transform:uppercase;letter-spacing:.05em;}
  .card .value{font-family:'Fraunces',serif;font-size:26px;margin-top:5px;}
  .title-icon{width:16px;height:16px;stroke-width:2;vertical-align:-3px;margin-right:6px;color:var(--gold-deep);}
  .empty{border:1px dashed var(--line-gold);border-radius:12px;padding:30px;text-align:center;color:#8A8371;background:rgba(198,153,46,.03);}
  .empty a{color:var(--gold-deep);cursor:pointer;text-decoration:underline;font-weight:600;}
  .btn-outline svg, .btn-primary svg, .btn-danger svg, .mode-btn svg, .btn-send svg{width:14px;height:14px;vertical-align:-2px;margin-right:5px;stroke-width:2.1;}
  .btn-send{display:inline-flex;align-items:center;}
  .btn-send svg{margin-right:0;}
  .history-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:12px 17px;margin-bottom:9px;font-size:13px;cursor:pointer;box-shadow:var(--shadow-sm);transition:border-color .15s, transform .15s;gap:10px;}
  .history-item:hover{border-color:var(--gold);transform:translateY(-1px);}
  .history-item .t{font-weight:700;color:var(--ink);}
  .history-item .tm{font-size:11px;color:#8A8371;}
  .history-item .chevron{color:#C9BE9A;flex-shrink:0;width:16px;height:16px;}
  .score-item .lbl svg{width:13px;height:13px;margin-right:4px;vertical-align:-2px;color:var(--gold-deep);}
  .step-line svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
  .issue .sev svg{width:13px;height:13px;vertical-align:-2px;margin-right:3px;}
  .pill{display:inline-flex;align-items:center;gap:4px;}
  .pill svg{width:11px;height:11px;}
  .audio-picked svg{width:18px;height:18px;}
  .mode-btn{display:inline-flex;align-items:center;justify-content:center;}
  .charts{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-top:28px;}
  .chart-card{background:var(--surface);border:1px solid var(--line-gold);border-radius:12px;padding:18px;box-shadow:var(--shadow-sm);}
  .chart-card .title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:10px;letter-spacing:.01em;}

  .btn-outline{font-size:13px;padding:7px 14px;border:1px solid var(--line-gold);border-radius:6px;background:var(--surface);cursor:pointer;color:var(--ink);transition:background .15s,border-color .15s;}
  .btn-outline:hover{background:rgba(198,153,46,.08);border-color:var(--gold);}
  .btn-primary{background:linear-gradient(135deg,var(--ink) 0%,var(--ink-2) 100%);color:#fff;border:1px solid rgba(198,153,46,.4);border-radius:7px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-sm);transition:box-shadow .15s, border-color .15s, transform .15s;}
  .btn-primary:hover{border-color:var(--gold);box-shadow:0 0 0 3px rgba(198,153,46,.12), var(--shadow-md);transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.5;cursor:default;transform:none;}
  .btn-danger{background:none;border:1px solid var(--danger);color:var(--danger);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;}
  .btn-danger:hover{background:rgba(139,46,46,.06);}
  textarea, input[type=text], input[type=password]{font-family:inherit;font-size:14px;border:1px solid #DDD3B4;border-radius:7px;background:var(--surface);padding:10px 12px;}
  textarea:focus, input:focus{outline:none;box-shadow:0 0 0 3px rgba(198,153,46,.22);border-color:var(--gold);}

  .login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 20%, #16233F 0%, var(--ink-deep) 65%);}
  .login-card{background:var(--paper);border-radius:16px;padding:44px 38px 38px;width:340px;box-shadow:0 30px 80px rgba(0,0,0,.45);position:relative;overflow:hidden;}
  .login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--gold-deep),var(--gold-light),var(--gold-deep));}
  .login-card h1{font-size:25px;color:var(--ink);margin:0 0 4px;}
  .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
  .login-card label{font-size:12px;font-weight:700;color:var(--ink);display:block;margin-bottom:5px;margin-top:14px;}
  .login-card input{width:100%;}
  .login-card button{width:100%;margin-top:22px;}
  .login-err{color:var(--danger);font-size:13px;margin-top:12px;min-height:16px;}

  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 60px);}
  .chat-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .messages{flex:1;overflow-y:auto;margin-top:16px;display:flex;flex-direction:column;gap:10px;}
  .msg{max-width:70%;padding:11px 15px;border-radius:12px;font-size:14px;white-space:pre-wrap;}
  .msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--ink),var(--ink-2));color:var(--paper);box-shadow:var(--shadow-sm);}
  .msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--line-gold);box-shadow:var(--shadow-sm);}
  .chat-input{display:flex;gap:8px;margin-top:14px;}
  .chat-input input{flex:1;}
  .btn-send{background:linear-gradient(135deg,var(--ink),var(--ink-2));color:#fff;border:1px solid rgba(198,153,46,.4);border-radius:7px;padding:0 18px;cursor:pointer;}
  .btn-send:hover{border-color:var(--gold);}
  .typing{color:#8A8371;font-size:13px;}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:22px;}
  .mode-toggle{display:flex;gap:8px;margin-bottom:10px;}
  .mode-btn{flex:1;padding:9px;border:1px solid #DDD3B4;border-radius:7px;background:var(--surface);font-size:13px;cursor:pointer;color:var(--ink);font-family:inherit;transition:all .15s;}
  .mode-btn.active{background:linear-gradient(135deg,var(--ink),var(--ink-2));color:#fff;border-color:var(--gold);}
  .audio-drop{border:1.5px dashed var(--line-gold);border-radius:9px;padding:26px;text-align:center;cursor:pointer;background:var(--surface);transition:background .15s,border-color .15s;}
  .audio-drop:hover{background:rgba(198,153,46,.05);border-color:var(--gold);}
  .audio-hint{color:#8A8371;font-size:13px;}
  .audio-hint span{font-size:11px;}
  .audio-picked{font-size:14px;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:10px;font-weight:600;}
  .audio-picked button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:15px;}
  .field-label{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px;}
  textarea.transcript{width:100%;}
  .btn-analyze{width:100%;margin-top:12px;}
  .err{color:var(--danger);font-size:13px;margin-top:8px;}

  .script-note{background:linear-gradient(180deg,#fff,var(--paper));border:1px solid var(--line-gold);border-radius:9px;padding:13px 15px;margin-bottom:18px;font-size:13px;color:#4B4536;box-shadow:var(--shadow-sm);}
  .script-note ol{margin:6px 0 0;padding-left:18px;}

  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;background:var(--surface);border:1px solid var(--line-gold);border-radius:12px;padding:18px;box-shadow:var(--shadow-sm);}
  .score-item .lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--ink);font-weight:700;margin-bottom:4px;}
  .score-bar{height:9px;border-radius:5px;background:#EFE8D2;overflow:hidden;}
  .score-bar > div{height:100%;border-radius:5px;transition:width .6s ease;}

  .result-card{background:var(--surface);border:1px solid var(--line-gold);border-radius:12px;padding:17px;margin-top:16px;box-shadow:var(--shadow-sm);}
  .result-card .title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;}
  .step-line{display:flex;gap:8px;align-items:flex-start;font-size:14px;margin-bottom:8px;}
  .issue{border-left:3px solid var(--gold);padding-left:13px;margin-bottom:16px;}
  .issue .sev{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
  .issue .quote{font-style:italic;font-size:14px;margin-top:5px;color:#242017;}
  .issue .row{font-size:13px;margin-top:5px;line-height:1.45;}
  .issue .row b{color:var(--ink);}

  .form-grid{display:grid;gap:12px;max-width:640px;margin-top:20px;}
  .form-grid label{font-size:13px;font-weight:700;color:var(--ink);}
  .form-grid textarea, .form-grid input{width:100%;}
  table{width:100%;border-collapse:collapse;margin-top:20px;background:var(--surface);border:1px solid var(--line-gold);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
  th, td{text-align:left;padding:11px 15px;font-size:13px;border-bottom:1px solid var(--line);}
  th{background:var(--ink);color:var(--gold-light);font-weight:700;font-size:12px;letter-spacing:.02em;}
  tr:hover td{background:rgba(198,153,46,.04);}
  tr:last-child td{border-bottom:none;}
  .pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;}
  .pill.admin{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--ink);}
  .pill.operator{background:#DCE3F0;color:var(--ink);}
  .pill.inactive{background:#F0D9D3;color:var(--danger);}
  .add-user-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;background:var(--surface);border:1px solid var(--line-gold);border-radius:12px;padding:15px;box-shadow:var(--shadow-sm);}
  .add-user-form input, .add-user-form select{flex:1;min-width:120px;}

  .step-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:7px 13px;font-size:14px;margin-bottom:6px;}
  .step-row button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;}
  .add-step{display:flex;gap:8px;margin:10px 0 20px;}
  .add-step input{flex:1;}
  .add-step button{border:1px solid #DDD3B4;border-radius:7px;background:var(--surface);width:38px;cursor:pointer;}

  .modal-overlay{position:fixed;inset:0;background:rgba(6,10,19,.65);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .modal-box{background:var(--paper);border-radius:14px;padding:28px 28px 26px;width:320px;box-shadow:0 30px 70px rgba(0,0,0,.45);position:relative;overflow:hidden;}
  .modal-box::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold-deep),var(--gold-light),var(--gold-deep));}
  .modal-box h2{font-size:18px;margin:0 0 4px;color:var(--ink);}
  .modal-box .sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
  .modal-box label{font-size:12px;font-weight:700;color:var(--ink);display:block;margin:12px 0 5px;}
  .modal-box input{width:100%;}
  .modal-actions{display:flex;gap:8px;margin-top:20px;}
  .modal-actions button{flex:1;}
  .modal-msg{font-size:13px;margin-top:10px;min-height:16px;}

  @media (max-width:800px){
    .cols, .charts{grid-template-columns:1fr;}
    .stats{grid-template-columns:1fr;}
    .sidebar{width:70px;}
    .sidebar .brand .name, .sidebar .brand .sub, .nav button span.lbl, .sidebar .foot .who, .sidebar .foot .role{display:none;}
    .nav button{justify-content:center;border-left:none;border-radius:7px;}
    .nav button.active{border-left:none;box-shadow:inset 0 0 0 1px var(--gold);}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
