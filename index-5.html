<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SotuvAI — Sotuv menejeri yordamchisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#14213D; --ink-light:#1F2E52; --paper:#F6F3EC;
    --gold:#C08A28; --gold-light:#E8C97A;
    --success:#4C7A5E; --danger:#B5483F; --muted:#6B6558; --line:#EAE4D3;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Manrope',sans-serif;background:var(--paper);color:#242017;}
  h1,h2,.serif{font-family:'Fraunces',serif;}
  .app{display:flex;height:100vh;}
  .sidebar{width:230px;flex-shrink:0;background:var(--ink);color:var(--paper);display:flex;flex-direction:column;}
  .sidebar .brand{padding:26px 22px 14px;}
  .sidebar .brand .name{font-size:20px;font-weight:600;color:var(--paper);}
  .sidebar .brand .sub{font-size:12px;color:#9AA3BD;margin-top:2px;}
  .ikat{width:100%;height:8px;}
  .nav{flex:1;padding:18px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
  .nav .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#6E78A0;padding:14px 12px 4px;}
  .nav button{display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;background:none;color:#C7CCDB;font-size:14px;border-radius:6px;cursor:pointer;text-align:left;font-family:inherit;width:100%;}
  .nav button:hover{background:#1B2A4A;color:var(--paper);}
  .nav button.active{background:var(--ink-light);color:var(--gold-light);font-weight:600;}
  .sidebar .foot{padding:14px 18px;font-size:12px;color:#C7CCDB;border-top:1px solid #25335A;}
  .sidebar .foot .who{font-weight:600;color:var(--paper);}
  .sidebar .foot .role{font-size:11px;color:#9AA3BD;}
  .sidebar .foot button{margin-top:8px;width:100%;background:#25335A;color:#F6F3EC;border:none;border-radius:6px;padding:7px;font-size:12px;cursor:pointer;}
  .sidebar .foot button:hover{background:#2E3F6B;}
  .main{flex:1;overflow-y:auto;}
  .page{padding:36px;max-width:1150px;}
  .page h1{font-size:28px;color:var(--ink);margin:0;}
  .page .desc{color:var(--muted);margin-top:6px;font-size:14px;}
  .divider{width:150px;margin-top:14px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;}
  .card .label{font-size:11px;color:#8A8371;text-transform:uppercase;letter-spacing:.04em;}
  .card .value{font-family:'Fraunces',serif;font-size:26px;margin-top:8px;}
  .empty{border:1px dashed var(--line);border-radius:10px;padding:28px;text-align:center;color:#8A8371;}
  .empty a{color:var(--gold);cursor:pointer;text-decoration:underline;}
  .history-item{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:11px 16px;margin-bottom:8px;font-size:13px;cursor:pointer;}
  .history-item:hover{border-color:var(--gold);}
  .history-item .t{font-weight:600;color:var(--ink);}
  .history-item .tm{font-size:11px;color:#8A8371;}
  .charts{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-top:26px;}
  .chart-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;}
  .chart-card .title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:10px;}

  .btn-outline{font-size:13px;padding:7px 14px;border:1px solid #D8D1BE;border-radius:6px;background:#fff;cursor:pointer;color:var(--ink);}
  .btn-outline:hover{background:#F0EBDD;}
  .btn-primary{background:var(--ink);color:#fff;border:none;border-radius:6px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-primary:hover{background:var(--ink-light);}
  .btn-primary:disabled{opacity:.5;cursor:default;}
  .btn-danger{background:none;border:1px solid var(--danger);color:var(--danger);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;}
  textarea, input[type=text], input[type=password]{font-family:inherit;font-size:14px;border:1px solid #D8D1BE;border-radius:6px;background:#fff;padding:10px 12px;}
  textarea:focus, input:focus{outline:none;box-shadow:0 0 0 2px var(--gold);}

  .login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);}
  .login-card{background:var(--paper);border-radius:14px;padding:40px 36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .login-card h1{font-size:24px;color:var(--ink);margin:0 0 4px;}
  .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
  .login-card label{font-size:12px;font-weight:600;color:var(--ink);display:block;margin-bottom:5px;margin-top:14px;}
  .login-card input{width:100%;}
  .login-card button{width:100%;margin-top:22px;}
  .login-err{color:var(--danger);font-size:13px;margin-top:12px;min-height:16px;}

  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 60px);}
  .chat-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .messages{flex:1;overflow-y:auto;margin-top:16px;display:flex;flex-direction:column;gap:10px;}
  .msg{max-width:70%;padding:10px 14px;border-radius:10px;font-size:14px;white-space:pre-wrap;}
  .msg.user{align-self:flex-end;background:var(--ink);color:var(--paper);}
  .msg.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);}
  .chat-input{display:flex;gap:8px;margin-top:14px;}
  .chat-input input{flex:1;}
  .btn-send{background:var(--ink);color:#fff;border:none;border-radius:6px;padding:0 18px;cursor:pointer;}
  .btn-send:hover{background:var(--ink-light);}
  .typing{color:#8A8371;font-size:13px;}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:20px;}
  .mode-toggle{display:flex;gap:8px;margin-bottom:10px;}
  .mode-btn{flex:1;padding:8px;border:1px solid #D8D1BE;border-radius:6px;background:#fff;font-size:13px;cursor:pointer;color:var(--ink);font-family:inherit;}
  .mode-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .audio-drop{border:1px dashed #D8D1BE;border-radius:8px;padding:24px;text-align:center;cursor:pointer;background:#fff;}
  .audio-drop:hover{background:#F0EBDD;}
  .audio-hint{color:#8A8371;font-size:13px;}
  .audio-hint span{font-size:11px;}
  .audio-picked{font-size:14px;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:10px;}
  .audio-picked button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:15px;}
  .field-label{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px;}
  textarea.transcript{width:100%;}
  .btn-analyze{width:100%;margin-top:12px;}
  .err{color:var(--danger);font-size:13px;margin-top:8px;}

  .script-note{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#4B4536;}
  .script-note ol{margin:6px 0 0;padding-left:18px;}

  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;}
  .score-item .lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--ink);font-weight:600;margin-bottom:4px;}
  .score-bar{height:8px;border-radius:4px;background:#EAE4D3;overflow:hidden;}
  .score-bar > div{height:100%;border-radius:4px;transition:width .5s ease;}

  .result-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-top:16px;}
  .result-card .title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:10px;}
  .step-line{display:flex;gap:8px;align-items:flex-start;font-size:14px;margin-bottom:8px;}
  .issue{border-left:3px solid var(--gold);padding-left:12px;margin-bottom:16px;}
  .issue .sev{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .issue .quote{font-style:italic;font-size:14px;margin-top:5px;color:#242017;}
  .issue .row{font-size:13px;margin-top:5px;line-height:1.45;}
  .issue .row b{color:var(--ink);}

  .form-grid{display:grid;gap:12px;max-width:640px;margin-top:20px;}
  .form-grid label{font-size:13px;font-weight:600;color:var(--ink);}
  .form-grid textarea, .form-grid input{width:100%;}
  table{width:100%;border-collapse:collapse;margin-top:20px;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  th, td{text-align:left;padding:10px 14px;font-size:13px;border-bottom:1px solid var(--line);}
  th{background:#F0EBDD;color:var(--ink);font-weight:600;}
  tr:last-child td{border-bottom:none;}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
  .pill.admin{background:#E8C97A;color:var(--ink);}
  .pill.operator{background:#DCE3F0;color:var(--ink);}
  .pill.inactive{background:#F0D9D3;color:var(--danger);}
  .add-user-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;}
  .add-user-form input, .add-user-form select{flex:1;min-width:120px;}

  .step-row{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:6px;padding:6px 12px;font-size:14px;margin-bottom:6px;}
  .step-row button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;}
  .add-step{display:flex;gap:8px;margin:10px 0 20px;}
  .add-step input{flex:1;}
  .add-step button{border:1px solid #D8D1BE;border-radius:6px;background:#fff;width:38px;cursor:pointer;}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,33,61,.55);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .modal-box{background:var(--paper);border-radius:12px;padding:26px 28px;width:320px;box-shadow:0 20px 50px rgba(0,0,0,.35);}
  .modal-box h2{font-size:18px;margin:0 0 4px;color:var(--ink);}
  .modal-box .sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
  .modal-box label{font-size:12px;font-weight:600;color:var(--ink);display:block;margin:12px 0 5px;}
  .modal-box input{width:100%;}
  .modal-actions{display:flex;gap:8px;margin-top:20px;}
  .modal-actions button{flex:1;}
  .modal-msg{font-size:13px;margin-top:10px;min-height:16px;}

  @media (max-width:800px){
    .cols, .charts{grid-template-columns:1fr;}
    .stats{grid-template-columns:1fr;}
    .sidebar{width:70px;}
    .sidebar .brand .name, .sidebar .brand .sub, .nav button span.lbl, .sidebar .foot .who, .sidebar .foot .role{display:none;}
    .nav button{justify-content:center;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
